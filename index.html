    }

    .sub{color:var(--muted);margin-top:8px;line-height:1.6}
    .grid{display:grid;grid-template-columns:1.1fr .9fr;gap:18px;margin-top:18px}
    @media (max-width:900px){.grid{grid-template-columns:1fr}}
    .card{background:rgba(18,26,43,.92);border:1px solid rgba(255,255,255,.08);border-radius:22px;padding:18px;box-shadow:0 12px 30px rgba(0,0,0,.25)}
    .title{font-size:18px;font-weight:700;margin:0 0 12px;color:var(--gold2)}
    .chips{display:flex;flex-wrap:wrap;gap:10px}
    .chip{display:inline-flex;align-items:center;gap:8px;background:var(--chip);padding:10px 14px;border-radius:999px;border:1px solid rgba(255,255,255,.08);cursor:pointer;user-select:none}

    select,button,.btn, .radius{width:100%;background:var(--panel2);color:var(--text);border:1px solid var(--line);border-radius:14px;padding:12px 14px;font-size:15px}

</head>

    </div>

const otherSuffixes = ['ゴルフクラブ','カントリークラブ','ゴルフ倶楽部'];

function seededNumber(str){let h=0; for(let i=0;i<str.length;i++) h=(h*31 + str.charCodeAt(i))>>>0; return h;}
function pseudoRand(seed, idx){ const x = Math.sin(seed*0.0001 + idx*12.9898) * 43758.5453; return x - Math.floor(x); }

function generateOtherCourses(pref){
  const base = seededNumber(pref.name);
  const count = 8 + (base % 8); // 8-15
  const items = [];
  for(let i=0;i<count;i++){
    const p1 = otherNameParts[(base + i*3) % otherNameParts.length];
    const p2 = otherSuffixes[(base + i*5) % otherSuffixes.length];
    const name = `${pref.name.replace('県','').replace('府','').replace('都','').replace('北海道','北海道')} ${p1}${p2}`;
    const r1 = pseudoRand(base, i+1), r2 = pseudoRand(base, i+2);
    const elevation = Math.round((pref.summerBias+3)*60 + r1*500);
    const snowRisk = Math.max(0, Math.min(10, Math.round(5 - pref.winterBias/2 + (r2*4-2))));
    const rating = Math.max(3.9, Math.min(4.8, 3.9 + (pseudoRand(base, i+3)*0.9)));
    items.push({
      name, pref:pref.name, region:pref.region, brand:'その他', rating:+rating.toFixed(1),
      distanceKm: Math.round(8 + pseudoRand(base, i+4)*70),
      elevation, snowRisk,
      solo: pseudoRand(base,i+5)>.35,
      stay: pseudoRand(base,i+6)>.62,
      cart: true,
      onsen: pseudoRand(base,i+7)>.55,
      ic: pseudoRand(base,i+8)>.28,
      scenic: pseudoRand(base,i+9)>.33,
      bookingUrl:`https://www.google.com/search?q=${encodeURIComponent(name+' 予約')}`
    });
  }
  return items;
}

function courseObj(name, prefName, brand, idx=0){
  const pref = prefectures.find(p=>p.name===prefName);
  const base = seededNumber(name+brand);
  const elevationBase = Math.max(40,(pref.summerBias+2)*80 + (base%260));
  const ratingBase = brand==='GRAND PGM'?4.5:brand==='PGM'?4.2:brand==='アコーディア'?4.0:4.0;
  const snowRisk = Math.max(0, Math.min(10, Math.round(5 - pref.winterBias/2 + ((base%5)-2))));
  return {
    name, pref:prefName, region:pref.region, brand,
    rating:+Math.min(4.9, ratingBase + ((base%5)*0.08)).toFixed(1),
    distanceKm: Math.round(10 + (base % 55)),
    elevation: Math.round(elevationBase),
    snowRisk,
    solo: (base % 10) > 2,
    stay: (base % 11) > 7,
    cart: true,
    onsen: (base % 7) > 3,
    ic: (base % 8) > 1,
    scenic: (base % 9) > 2,
    bookingUrl: brand==='その他'
      ? `https://www.google.com/search?q=${encodeURIComponent(name+' 予約')}`
      : `https://www.google.com/search?q=${encodeURIComponent(name+' 公式 予約')}`
  };
}

const courses = [];
for(const [pref, list] of Object.entries(grandCourses)) list.forEach((n,i)=>courses.push(courseObj(n,pref,'GRAND PGM',i)));
for(const [pref, list] of Object.entries(pgmCourses)) list.forEach((n,i)=>courses.push(courseObj(n,pref,'PGM',i)));
for(const [pref, list] of Object.entries(accordiaCourses)) list.forEach((n,i)=>courses.push(courseObj(n,pref,'アコーディア',i)));
prefectures.forEach(pref=> generateOtherCourses(pref).forEach(c=>courses.push(c)));

function currentSeason(){
  const m = new Date().getMonth()+1;
  if([3,4,5].includes(m)) return 'spring';
  if([6,7,8].includes(m)) return 'summer';
  if([9,10,11].includes(m)) return 'autumn';
  return 'winter';
}
function seasonLabel(s){return {spring:'春',summer:'夏',autumn:'秋',winter:'冬'}[s] || '自動判定';}
function selectedValues(containerId){return [...document.querySelectorAll(`#${containerId} input:checked`)].map(x=>x.value);}
function seasonalScore(course, season){
  let score = 70;
  if(season==='summer'){
    score += Math.min(18, course.elevation / 80);
    score += ['北海道','東北','甲信越'].includes(course.region) ? 10 : 0;
    score -= ['近畿','中国','四国','九州','沖縄'].includes(course.region) ? 5 : 0;
  } else if(season==='winter'){
    score += (10 - course.snowRisk) * 2.2;
    score += ['九州','四国','中国','近畿','東海','沖縄'].includes(course.region) ? 8 : 0;
    score -= ['北海道','東北','北陸'].includes(course.region) ? 10 : 0;
    score += ['静岡県','和歌山県','高知県','宮崎県','鹿児島県','沖縄県'].includes(course.pref) ? 8 : 0;
  } else if(season==='spring'){
    score += (10-course.snowRisk)*0.8 + Math.min(8, course.elevation/180);
  } else if(season==='autumn'){
    score += Math.min(10, course.elevation/120) + course.scenic*6;
  }
  score += (course.rating - 3.8) * 18;
  score += course.ic ? 3 : 0;
  return Math.round(score);
}
function prefSeasonScore(pref, season){
  let score = 70;
  if(season==='summer') score += pref.summerBias*3;
  if(season==='winter') score += pref.winterBias*3;
  if(season==='spring') score += pref.winterBias>2 ? 3 : 0;
  if(season==='autumn') score += pref.summerBias>3 ? 2 : 0;
  return Math.max(1, score);
}
function weightedPick(arr, weightFn){
  const weighted = arr.map(item=>Math.max(1, weightFn(item)));
  const total = weighted.reduce((a,b)=>a+b,0);
  let r = Math.random()*total;
  for(let i=0;i<arr.length;i++){
    r -= weighted[i];
    if(r<=0) return arr[i];
  }
  return arr[arr.length-1];
}

function buildChips(){
  const brandWrap = document.getElementById('brandChips');
  brands.forEach((b, i)=>{
    const id = 'brand_'+i;
    brandWrap.insertAdjacentHTML('beforeend', `<label class="chip"><input type="checkbox" id="${id}" value="${b}" checked> ${b}</label>`);
  });
  const featWrap = document.getElementById('featureChips');
  features.forEach((f, i)=>{
    const id = 'feat_'+i;
    featWrap.insertAdjacentHTML('beforeend', `<label class="chip"><input type="checkbox" id="${id}" value="${f.key}"> ${f.label}</label>`);
  });
}

function filteredCoursesForPref(prefName){
  const selectedBrands = selectedValues('brandChips');
  const selectedFeatures = selectedValues('featureChips');
  const radius = Number(document.getElementById('radiusSelect').value);
  return courses.filter(c=> c.pref===prefName)
    .filter(c=> selectedBrands.includes(c.brand))
    .filter(c=> c.distanceKm <= radius)
    .filter(c=> selectedFeatures.every(key => c[key]===true));
}

let lastPref = null;
let lastSeason = currentSeason();

function renderCandidates(prefName, season, chosenName=null){
  const wrap = document.getElementById('candidateList');
  const list = filteredCoursesForPref(prefName)
    .map(c=>({...c, comfort: seasonalScore(c, season)}))
    .sort((a,b)=> b.comfort-a.comfort || b.rating-a.rating)
    .slice(0, 12);
  if(list.length===0){
    wrap.innerHTML = '<div class="item">条件に合う候補が見つかりませんでした。ブランドか条件を少し緩めてください。</div>';
    return [];
  }
  wrap.innerHTML = list.map(c=>`
    <div class="item" style="${c.name===chosenName?'outline:1px solid rgba(212,175,55,.5);box-shadow:0 0 0 1px rgba(212,175,55,.15) inset;':''}">
      <div class="itemTop">
        <div>
          <div class="itemName">${c.name}</div>
          <div class="itemMeta">${c.brand} ・ ${c.pref} ・ ${c.region}</div>
        </div>
        <div class="badge gold">快適度 ${c.comfort}</div>
      </div>
      <div class="itemMeta">評価 ${c.rating.toFixed(1)} / 県庁所在地から約 ${c.distanceKm}km / 標高目安 ${c.elevation}m / 雪リスク ${c.snowRisk}/10</div>
      <div class="links"><a class="linkBtn" target="_blank" rel="noopener" href="${c.bookingUrl}">予約・公式を探す</a></div>
    </div>
  `).join('');
  return list;
}

function renderResult(pref, season, course){
  document.getElementById('prefResult').textContent = pref.name;
  document.getElementById('prefMeta').innerHTML = `
    <span class="badge gold">${pref.region}</span>
    <span class="badge">${seasonLabel(season)}</span>
    <span class="badge ok">県庁所在地: ${pref.capital}</span>
  `;
  const summerMsg = course.elevation >= 500 ? '夏でも比較的涼しめ' : '真夏は暑さ対策推奨';
  const winterMsg = course.snowRisk <= 3 ? '冬も比較的安心' : '冬は天候確認推奨';
  const seasonMsg = season==='summer' ? summerMsg : season==='winter' ? winterMsg : season==='autumn' ? '景観も楽しみやすい時期' : '動きやすいシーズン';
  document.getElementById('courseBox').innerHTML = `
    <div class="course">${course.name}</div>
    <div class="brand">${course.brand}</div>
    <div class="meta" style="justify-content:flex-start;margin-top:10px">
      <span class="badge gold">快適度 ${seasonalScore(course, season)}</span>
      <span class="badge ok">評価 ${course.rating.toFixed(1)}</span>
      <span class="badge">県庁所在地から約 ${course.distanceKm}km</span>
    </div>
    <div class="small" style="margin-top:12px">${seasonMsg}。標高目安 ${course.elevation}m、雪リスク ${course.snowRisk}/10。${course.ic?'高速IC近め・ ':''}${course.onsen?'温泉近く・ ':''}${course.solo?'1人予約可・ ':''}${course.stay?'宿泊あり・ ':''}${course.scenic?'景観良好':''}</div>
    <div class="links">
      <a class="linkBtn" target="_blank" rel="noopener" href="${course.bookingUrl}">予約・公式を探す</a>
      <a class="linkBtn" target="_blank" rel="noopener" href="https://www.google.com/search?q=${encodeURIComponent(course.name+' アクセス')}">アクセスを見る</a>
    </div>
  `;
}

function spinRoulette(){
  const seasonChoice = document.getElementById('seasonSelect').value;
  const season = seasonChoice==='auto' ? currentSeason() : seasonChoice;
  lastSeason = season;

  const eligiblePrefs = prefectures.filter(p=> filteredCoursesForPref(p.name).length > 0);
  if(eligiblePrefs.length===0){
    document.getElementById('prefResult').textContent = '候補なし';
    document.getElementById('prefMeta').innerHTML = '<span class="badge danger">条件に合う都道府県がありません</span>';
    document.getElementById('courseBox').innerHTML = '<div class="small">ブランドか条件を少し緩めてください。</div>';
    document.getElementById('candidateList').innerHTML = '';
    return;
  }

  const animationPool = eligiblePrefs.map(p=>p.name);
  let i=0, ticks=0, totalTicks=18 + Math.floor(Math.random()*10);
  const prefEl = document.getElementById('prefResult');
  const metaEl = document.getElementById('prefMeta');
  metaEl.innerHTML = `<span class="badge">${seasonLabel(season)}の快適度を反映中</span>`;
  const interval = setInterval(()=>{
    prefEl.textContent = animationPool[i % animationPool.length];
    i++; ticks++;
    if(ticks >= totalTicks){
      clearInterval(interval);
      const pickedPref = weightedPick(eligiblePrefs, p => prefSeasonScore(p, season));
      lastPref = pickedPref.name;
      const candidates = renderCandidates(pickedPref.name, season);
      const chosen = weightedPick(candidates, c => seasonalScore(c, season));
      renderResult(pickedPref, season, chosen);
      renderCandidates(pickedPref.name, season, chosen.name);
    }
  }, 85 + Math.min(180, ticks*6));
}

function rerollCourse(){
  if(!lastPref){ spinRoulette(); return; }
  const pref = prefectures.find(p=>p.name===lastPref);
  const candidates = renderCandidates(lastPref, lastSeason);
  if(candidates.length===0){
    document.getElementById('courseBox').innerHTML = '<div class="small">この県では、現在の条件に合う候補がありません。</div>';
    return;
  }
  const chosen = weightedPick(candidates, c => seasonalScore(c, lastSeason));
  renderResult(pref, lastSeason, chosen);
  renderCandidates(lastPref, lastSeason, chosen.name);
}

buildChips();
document.getElementById('spinBtn').addEventListener('click', spinRoulette);
document.getElementById('rerollCourseBtn').addEventListener('click', rerollCourse);
spinRoulette();
</script>
