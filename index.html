<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Golf Journey Roulette Premium</title>
  <style>
    :root {
      --bg: #0b1220;
      --panel: rgba(17, 24, 39, 0.9);
      --panel-2: rgba(15, 23, 42, 0.95);
      --line: rgba(255,255,255,0.12);
      --text: #eef2ff;
      --muted: #a5b4cc;
      --gold: #d4af37;
      --gold-2: #f6e27a;
      --green: #22c55e;
      --red: #f87171;
      --blue: #60a5fa;
      --chip: rgba(255,255,255,0.07);
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: -apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,"Hiragino Sans","Noto Sans JP",sans-serif;
      background:
        radial-gradient(circle at top, rgba(212,175,55,0.10), transparent 30%),
        linear-gradient(180deg, #08101d 0%, #0b1220 45%, #111827 100%);
      color: var(--text);
      min-height: 100vh;
    }
    .wrap { max-width: 1200px; margin: 0 auto; padding: 20px; }
    .hero { display:flex; justify-content:space-between; align-items:center; gap:16px; flex-wrap:wrap; margin-bottom:18px; }
    .hero h1 { margin:0; font-size: clamp(28px, 4vw, 42px); font-weight:800; background: linear-gradient(90deg, #fff, var(--gold-2)); -webkit-background-clip:text; -webkit-text-fill-color:transparent; }
    .hero p { margin:6px 0 0; color:var(--muted); }
    .grid { display:grid; grid-template-columns:360px 1fr; gap:18px; }
    .panel { background: var(--panel); border: 1px solid var(--line); border-radius:24px; padding:18px; backdrop-filter:blur(12px); box-shadow:0 10px 40px rgba(0,0,0,0.25); }
    .panel h2,.panel h3 { margin:0 0 12px; }
    .section { margin-bottom:18px; }
    label.title { display:block; font-size:13px; color:var(--gold-2); margin-bottom:8px; font-weight:700; letter-spacing:0.06em; text-transform:uppercase; }
    select,button{font:inherit;}
    select { width:100%; padding:12px 14px; border-radius:14px; border:1px solid var(--line); background:var(--panel-2); color:var(--text); outline:none; }
    .chips{display:flex; flex-wrap:wrap; gap:8px;}
    .chip{display:inline-flex; align-items:center; gap:8px; padding:9px 12px; border-radius:999px; background:var(--chip); border:1px solid var(--line); cursor:pointer; user-select:none; font-size:14px; color:var(--text);}
    .chip input{display:none;}
    .chip.active{border-color:rgba(212,175,55,0.5); background:rgba(212,175,55,0.16); box-shadow: inset 0 0 0 1px rgba(212,175,55,0.15);}
    .actions{display:grid; grid-template-columns:1fr 1fr; gap:10px;}
    .btn{border:none; border-radius:16px; padding:14px 16px; font-weight:800; cursor:pointer; transition:transform .15s ease, opacity .15s ease;}
    .btn:hover{transform:translateY(-1px);} .btn:active{transform:translateY(0);} 
    .btn-primary{background:linear-gradient(135deg, var(--gold), var(--gold-2)); color:#241700;}
    .btn-secondary{background:rgba(255,255,255,0.08); color:var(--text); border:1px solid var(--line);}
    .stage{display:grid; gap:18px;}
    .roulette-card{background:linear-gradient(180deg, rgba(17,24,39,0.98), rgba(11,18,32,0.98)); border:1px solid rgba(212,175,55,0.2); border-radius:28px; padding:24px; box-shadow:0 20px 60px rgba(0,0,0,0.3), inset 0 1px 0 rgba(255,255,255,0.04);}
    .roulette-wrap{position:relative; overflow:hidden; height:240px; border-radius:22px; border:1px solid var(--line); background:linear-gradient(180deg, rgba(255,255,255,0.03), rgba(255,255,255,0.01));}
    .pointer-line{position:absolute; left:0; right:0; top:50%; transform:translateY(-50%); height:72px; border-top:2px solid rgba(212,175,55,0.85); border-bottom:2px solid rgba(212,175,55,0.85); background:linear-gradient(90deg, transparent, rgba(212,175,55,0.08), transparent); z-index:2; pointer-events:none;}
    .pointer-badge{position:absolute; right:16px; top:50%; transform:translateY(-50%); z-index:3; background:linear-gradient(135deg, var(--gold), var(--gold-2)); color:#291b00; font-weight:900; font-size:12px; padding:8px 12px; border-radius:999px; box-shadow:0 6px 20px rgba(0,0,0,0.25);}
    .ticker{position:absolute; left:0; right:0; top:0; will-change:transform; z-index:1;}
    .ticker-item{height:72px; display:flex; align-items:center; justify-content:center; font-size: clamp(24px, 3vw, 34px); font-weight:900; letter-spacing:0.03em; border-bottom:1px solid rgba(255,255,255,0.04); color:#e8ecff; text-shadow:0 4px 14px rgba(0,0,0,0.35);}
    .ticker-item:nth-child(odd){background:rgba(255,255,255,0.02);}
    .subline{margin-top:12px; color:var(--muted); display:flex; flex-wrap:wrap; gap:10px; font-size:14px;}
    .pill{display:inline-block; border-radius:999px; padding:8px 12px; background:rgba(255,255,255,0.06); border:1px solid var(--line); color:var(--text); font-size:13px;}
    .result-card{display:grid; gap:16px; grid-template-columns:1.1fr .9fr;}
    .winner{padding:20px; border-radius:24px; background:linear-gradient(180deg, rgba(212,175,55,0.12), rgba(212,175,55,0.05)); border:1px solid rgba(212,175,55,0.25);}
    .winner .kicker{color:var(--gold-2); font-size:13px; font-weight:800; text-transform:uppercase; letter-spacing:0.08em; margin-bottom:8px;}
    .winner .pref{font-size:40px; font-weight:900; margin-bottom:8px;}
    .winner .course{font-size:26px; font-weight:800; line-height:1.3; margin-bottom:10px;}
    .site-line{margin:4px 0 12px; font-size:14px;}
    .site-line a{color:#9ed0ff;}
    .meta{display:flex; flex-wrap:wrap; gap:8px; margin-bottom:14px;}
    .meta .pill.brand{border-color:rgba(96,165,250,0.4);} .meta .pill.score{border-color:rgba(34,197,94,0.4);} .meta .pill.dist{border-color:rgba(248,113,113,0.35);}
    .links{display:flex; flex-wrap:wrap; gap:10px; margin-top:14px;}
    .linkbtn{text-decoration:none; color:var(--text); padding:11px 14px; border-radius:14px; background:rgba(255,255,255,0.08); border:1px solid var(--line); font-weight:700;}
    .linkbtn.primary{background:linear-gradient(135deg, #1f6feb, #60a5fa); border:none;}
    .candidate-list{padding:16px; border-radius:24px; background:rgba(255,255,255,0.03); border:1px solid var(--line); max-height:420px; overflow:auto;}
    .candidate-item{padding:12px 0; border-bottom:1px solid rgba(255,255,255,0.06);} .candidate-item:last-child{border-bottom:none;}
    .candidate-top{display:flex; justify-content:space-between; gap:12px; align-items:start; margin-bottom:6px;}
    .candidate-name{font-weight:800; line-height:1.35;}
    .candidate-sub{color:var(--muted); font-size:13px;}
    .candidate-sub a{color:#9ed0ff;}
    .empty{padding:20px; border-radius:18px; background:rgba(248,113,113,0.1); border:1px solid rgba(248,113,113,0.25); color:#fecaca;}
    .note{color:var(--muted); font-size:12px; margin-top:10px;}
    @media (max-width:980px){ .grid,.result-card{grid-template-columns:1fr;} .wrap{padding:14px;} .roulette-card{padding:16px;} .roulette-wrap{height:216px;} .ticker-item{font-size:26px;} }
  </style>
</head>

  <div class="wrap">

          </div>
          <div class="candidate-list">

            <div id="candidateList"></div>
          </div>
        </div>
      </div>
    </div>
  </div>

function buildChips(target, values, activeSet) {
  target.innerHTML = '';
  values.forEach(v => {
    const label = document.createElement('label');
    label.className = 'chip active';
    label.innerHTML = `<input type="checkbox" checked><span>${v}</span>`;
    label.addEventListener('click', (e) => {
      e.preventDefault();
      if (activeSet.has(v)) activeSet.delete(v); else activeSet.add(v);
      if (target === brandChips && activeSet.size === 0) activeSet.add(v);
      renderChipStates();
      if (currentPref) renderForPref(currentPref, false);
    });
    target.appendChild(label);
  });
}
function renderChipStates() {
  [...brandChips.children].forEach((el, i) => el.classList.toggle('active', activeBrands.has(BRANDS[i])));
  [...conditionChips.children].forEach((el, i) => el.classList.toggle('active', activeConditions.has(CONDITIONS[i])));
}
function getSeason() {
  const val = seasonSelect.value;
  if (val !== 'auto') return val;
  const m = new Date().getMonth() + 1;
  if ([3,4,5].includes(m)) return 'spring';
  if ([6,7,8].includes(m)) return 'summer';
  if ([9,10,11].includes(m)) return 'autumn';
  return 'winter';
}
function seasonName(key) { return ({spring:'春', summer:'夏', autumn:'秋', winter:'冬'})[key] || '-'; }
function filteredPrefs() { return AREAS[areaSelect.value] || PREFS; }
function scoreComfort(course, season) {
  const t = PREF_TRAITS[course.prefecture] || {cool:0,warm:0,snow:0,closure:0,scenic:0};
  let score = 72 + (course.brand === 'GRAND PGM' ? 8 : course.brand === 'PGM' ? 4 : course.brand === 'アコーディア' ? 2 : 0);
  score += Math.max(0, (course.rating - 3.8) * 10);
  if (course.conditions.includes('カートあり')) score += 2;
  if (course.conditions.includes('高速IC近い')) score += 2;
  if (course.conditions.includes('宿泊あり')) score += 1;
  if (season === 'summer') score += t.cool * 1.8 - t.warm * 0.2 - t.snow * 0.1 + t.scenic * 0.4;
  else if (season === 'winter') score += t.warm * 1.9 - t.snow * 2.3 - t.closure * 1.8 + t.scenic * 0.2;
  else if (season === 'spring') score += t.scenic * 0.7 + t.warm * 0.3 - t.snow * 0.2;
  else if (season === 'autumn') score += t.scenic * 0.8 + t.cool * 0.4 - t.snow * 0.2;
  return Math.max(48, Math.min(99, Math.round(score)));
}
function getVerifiedCourses(pref) {
  const season = getSeason();
  return REAL_COURSES
    .filter(c => c.prefecture === pref)
    .filter(c => activeBrands.has(c.brand))
    .filter(c => [...activeConditions].every(cond => c.conditions.includes(cond)))
    .filter(c => c.brand !== 'その他' || c.rating >= 3.8)
    .map(c => ({...c, capital: PREF_CAPITALS[pref], comfort: scoreComfort(c, season), isFallback:false}))
    .sort((a,b) => b.comfort - a.comfort || b.rating - a.rating || a.distanceKm - b.distanceKm);
}
function buildOtherFallbacks(pref) {
  if (!activeBrands.has('その他')) return [];
  const season = getSeason();
  const desiredCount = 5;
  const existingOtherCount = getVerifiedCourses(pref).filter(c => c.brand === 'その他').length;
  const needed = Math.max(0, desiredCount - existingOtherCount);
  const fallbacks = [];
  for (let i=0;i<needed;i++) {
    fallbacks.push({
      id:`${pref}-other-fallback-${i}`,
      prefecture:pref,
      capital:PREF_CAPITALS[pref],
      brand:'その他',
      name:`${prefLabel(pref)} その他高評価コース候補 ${i+1}`,
      rating:3.8,
      distanceKm:20 + i * 9,
      conditions: activeConditions.size ? [...activeConditions] : ['カートあり'],
      site: GDO_PREF_URL(pref),
      officialUrl: GDO_PREF_URL(pref),
      searchUrl: GORA_PREF_URL(pref),
      comfort: Math.max(70, scoreComfort({prefecture:pref,brand:'その他',rating:3.8,conditions:['カートあり']}, season) - 3 + i),
      isFallback:true,
      fallbackNote:'県別の3.8以上検索結果へ移動します'
    });
  }
  return fallbacks;
}
function getEligibleCourses(pref) {
  const verified = getVerifiedCourses(pref).map((c,idx)=>({...c,id:`${pref}-${c.brand}-${idx}`,officialUrl:c.site,searchUrl:`https://www.google.com/search?q=${encodeURIComponent(c.name + ' ' + pref)}`}));
  const withFallbacks = [...verified, ...buildOtherFallbacks(pref)];
  return withFallbacks.sort((a,b) => b.comfort - a.comfort || b.rating - a.rating || a.distanceKm - b.distanceKm);
}
function makeTickerList(prefList, winnerPref) {
  const safe = prefList.length ? prefList : PREFS;
  const repeated = [];
  for (let k = 0; k < 6; k++) repeated.push(...safe);
  return [...repeated, winnerPref, ...safe.slice(0,8)];
}
function renderTicker(items) {
  ticker.innerHTML = '';
  items.forEach(name => {
    const div = document.createElement('div'); div.className = 'ticker-item'; div.textContent = name; ticker.appendChild(div);
  });
}
function pickWinnerPref() { const prefs = filteredPrefs(); return prefs[Math.floor(Math.random() * prefs.length)]; }
function animateToPref(winnerPref) {
  return new Promise(resolve => {
    const prefs = filteredPrefs();
    const tickerItems = makeTickerList(prefs, winnerPref); renderTicker(tickerItems);
    const winnerIndex = tickerItems.lastIndexOf(winnerPref);
    const targetY = (CONTAINER_H / 2) - (ITEM_H / 2) - (winnerIndex * ITEM_H);
    const duration = 3600; const start = performance.now();
    const easeOutCubic = t => 1 - Math.pow(1 - t, 3);
    function step(now) {
      const p = Math.min(1, (now - start) / duration);
      const currentTranslate = targetY * easeOutCubic(p);
      ticker.style.transform = `translateY(${currentTranslate}px)`;
      const centerIndex = Math.round(((CONTAINER_H / 2) - (ITEM_H / 2) - currentTranslate) / ITEM_H);
      statusLabel.textContent = `回転中: ${tickerItems[Math.max(0, Math.min(tickerItems.length - 1, centerIndex))]}`;
      if (p < 1) requestAnimationFrame(step); else { ticker.style.transform = `translateY(${targetY}px)`; statusLabel.textContent = `決定: ${winnerPref}`; resolve(); }
    }
    requestAnimationFrame(step);
  });
}
function linksForCourse(course) {
  const q = encodeURIComponent(course.name + ' ' + course.prefecture);
  return {booking: course.officialUrl || course.site, maps:`https://www.google.com/maps/search/?api=1&query=${q}`, search:course.searchUrl || `https://www.google.com/search?q=${q}`};
}
function renderCandidates(candidates, pickedId=null) {
  candidateList.innerHTML = '';
  if (!candidates.length) { candidateList.innerHTML = `<div class="empty">条件に合うゴルフ場が見つかりませんでした。ブランドか条件を少し緩めてください。</div>`; return; }
  candidates.forEach(c => {
    const row = document.createElement('div'); row.className = 'candidate-item';
    row.innerHTML = `
      <div class="candidate-top">
        <div>
          <div class="candidate-name">${c.id === pickedId ? '★ ' : ''}${c.name}</div>
          <div class="candidate-sub">${c.brand} / ${c.prefecture} / ${c.capital}近辺</div>
        </div>
        <div class="pill">快適度 ${c.comfort}</div>
      </div>
      <div class="candidate-sub">評価 ${c.rating.toFixed(1)} ・ 県庁所在地から約${c.distanceKm}km ・ ${c.conditions.join(' / ') || '条件情報なし'}</div>
      <div class="candidate-sub">${c.isFallback ? `検索候補: <a href="${c.officialUrl}" target="_blank" rel="noopener noreferrer">3.8以上の県別候補を見る</a>` : `公式サイト: <a href="${c.site}" target="_blank" rel="noopener noreferrer">${c.site}</a>`}</div>`;
    candidateList.appendChild(row);
  });
}
function renderWinner(pref, course, candidates) {
  winnerBox.querySelector('.pref').textContent = pref || '-';
  const courseEl = winnerBox.querySelector('.course');
  if (!course) {
    courseEl.textContent = '条件に合う候補がありません';
    winnerSite.innerHTML = '';
    winnerMeta.innerHTML = '';
    winnerText.textContent = 'ブランドや条件を見直して、もう一度回してください。';
    winnerLinks.innerHTML = '';
    renderCandidates(candidates || []);
    return;
  }
  courseEl.textContent = course.name;
  winnerSite.innerHTML = course.isFallback
    ? `高評価候補一覧: <a href="${course.officialUrl}" target="_blank" rel="noopener noreferrer">県別の3.8以上候補を見る</a>`
    : `公式サイト: <a href="${course.site}" target="_blank" rel="noopener noreferrer">${course.site}</a>`;
  winnerMeta.innerHTML = `<span class="pill brand">${course.brand}</span><span class="pill score">快適度 ${course.comfort}</span><span class="pill dist">${course.capital}から約${course.distanceKm}km</span><span class="pill">評価 ${course.rating.toFixed(1)}</span><span class="pill">${REGION_BY_PREF[pref]}</span>`;
  winnerText.textContent = course.isFallback ? `${seasonName(getSeason())}向き / 県別の高評価候補一覧へ進みます / 県庁所在地は${course.capital}` : `${seasonName(getSeason())}向き / ${course.conditions.join(' / ') || '条件情報なし'} / 県庁所在地は${course.capital}`;
  const links = linksForCourse(course);
  winnerLinks.innerHTML = `<a class="linkbtn primary" href="${links.booking}" target="_blank" rel="noopener noreferrer">公式サイトへ</a><a class="linkbtn" href="${links.maps}" target="_blank" rel="noopener noreferrer">Google Maps</a><a class="linkbtn" href="${links.search}" target="_blank" rel="noopener noreferrer">コース検索</a>`;
  renderCandidates(candidates, course.id);
}
function chooseCourseFromCandidates(candidates) {
  if (!candidates.length) return null;
  const real = candidates.filter(c => !c.isFallback);
  const pool = (real.length ? real : candidates).slice(0, Math.min(8, real.length ? real.length : candidates.length));
  return pool[Math.floor(Math.random() * pool.length)];
}
function renderForPref(pref, pickWinner=true) { currentPref = pref; const candidates = getEligibleCourses(pref); renderWinner(pref, pickWinner ? chooseCourseFromCandidates(candidates) : null, candidates); }
async function spinRoulette() {
  if (spinRunning) return; spinRunning = true; spinBtn.disabled = true; rerollBtn.disabled = true;
  seasonLabel.textContent = `季節: ${seasonName(getSeason())}`; areaLabel.textContent = `エリア: ${AREA_LABELS[areaSelect.value]}`;
  const winnerPref = pickWinnerPref(); await animateToPref(winnerPref); currentPref = winnerPref;
  const candidates = getEligibleCourses(winnerPref); renderWinner(winnerPref, chooseCourseFromCandidates(candidates), candidates);
  spinRunning = false; spinBtn.disabled = false; rerollBtn.disabled = false;
}
function rerollSamePref() { if (!currentPref) return; const candidates = getEligibleCourses(currentPref); renderWinner(currentPref, chooseCourseFromCandidates(candidates), candidates); statusLabel.textContent = `同じ県で再抽選: ${currentPref}`; }

buildChips(brandChips, BRANDS, activeBrands); buildChips(conditionChips, CONDITIONS, activeConditions); renderChipStates();
seasonLabel.textContent = `季節: ${seasonName(getSeason())}`; areaLabel.textContent = `エリア: ${AREA_LABELS[areaSelect.value]}`; statusLabel.textContent = '待機中';
const initialItems = makeTickerList(PREFS, '東京都'); renderTicker(initialItems); const initialIndex = initialItems.lastIndexOf('東京都'); const initialY = (CONTAINER_H / 2) - (ITEM_H / 2) - (initialIndex * ITEM_H); ticker.style.transform = `translateY(${initialY}px)`; renderWinner('-', null, []);
spinBtn.addEventListener('click', spinRoulette); rerollBtn.addEventListener('click', rerollSamePref);
seasonSelect.addEventListener('change', () => { seasonLabel.textContent = `季節: ${seasonName(getSeason())}`; if (currentPref) renderForPref(currentPref, true); });
areaSelect.addEventListener('change', () => { areaLabel.textContent = `エリア: ${AREA_LABELS[areaSelect.value]}`; statusLabel.textContent = '待機中'; currentPref = null; const prefs = filteredPrefs(); const items = makeTickerList(prefs, prefs[0]); renderTicker(items); const idx = items.lastIndexOf(prefs[0]); const y = (CONTAINER_H / 2) - (ITEM_H / 2) - (idx * ITEM_H); ticker.style.transform = `translateY(${y}px)`; renderWinner('-', null, []); });
</script>
