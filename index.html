<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Golf Journey Roulette Premium</title>
  <style>
    :root {
      --bg: #0b1220;
      --panel: rgba(17, 24, 39, 0.9);
      --panel-2: rgba(15, 23, 42, 0.95);
      --line: rgba(255,255,255,0.12);
      --text: #eef2ff;
      --muted: #a5b4cc;
      --gold: #d4af37;
      --gold-2: #f6e27a;
      --green: #22c55e;
      --red: #f87171;
      --blue: #60a5fa;
      --chip: rgba(255,255,255,0.07);
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: -apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,"Hiragino Sans","Noto Sans JP",sans-serif;
      background:
        radial-gradient(circle at top, rgba(212,175,55,0.10), transparent 30%),
        linear-gradient(180deg, #08101d 0%, #0b1220 45%, #111827 100%);
      color: var(--text);
      min-height: 100vh;
    }
    .wrap {
      max-width: 1200px;
      margin: 0 auto;
      padding: 20px;
    }
    .hero {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 16px;
      flex-wrap: wrap;
      margin-bottom: 18px;
    }
    .hero h1 {
      margin: 0;
      font-size: clamp(28px, 4vw, 42px);
      letter-spacing: 0.02em;
      font-weight: 800;
      background: linear-gradient(90deg, #fff, var(--gold-2));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }
    .hero p {
      margin: 6px 0 0;
      color: var(--muted);
    }
    .grid {
      display: grid;
      grid-template-columns: 360px 1fr;
      gap: 18px;
    }
    .panel {
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 24px;
      padding: 18px;
      backdrop-filter: blur(12px);
      box-shadow: 0 10px 40px rgba(0,0,0,0.25);
    }
    .panel h2, .panel h3 {
      margin: 0 0 12px;
    }
    .section { margin-bottom: 18px; }
    label.title {
      display: block;
      font-size: 13px;
      color: var(--gold-2);
      margin-bottom: 8px;
      font-weight: 700;
      letter-spacing: 0.06em;
      text-transform: uppercase;
    }
    select, button {
      font: inherit;
    }
    select {
      width: 100%;
      padding: 12px 14px;
      border-radius: 14px;
      border: 1px solid var(--line);
      background: var(--panel-2);
      color: var(--text);
      outline: none;
    }
    .chips {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
    }
    .chip {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 9px 12px;
      border-radius: 999px;
      background: var(--chip);
      border: 1px solid var(--line);
      cursor: pointer;
      user-select: none;
      font-size: 14px;
      color: var(--text);
    }
    .chip input { display: none; }
    .chip.active {
      border-color: rgba(212,175,55,0.5);
      background: rgba(212,175,55,0.16);
      box-shadow: inset 0 0 0 1px rgba(212,175,55,0.15);
    }
    .actions {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
    }
    .btn {
      border: none;
      border-radius: 16px;
      padding: 14px 16px;
      font-weight: 800;
      cursor: pointer;
      transition: transform .15s ease, opacity .15s ease;
    }
    .btn:hover { transform: translateY(-1px); }
    .btn:active { transform: translateY(0); }
    .btn-primary {
      background: linear-gradient(135deg, var(--gold), var(--gold-2));
      color: #241700;
    }
    .btn-secondary {
      background: rgba(255,255,255,0.08);
      color: var(--text);
      border: 1px solid var(--line);
    }
    .stage {
      display: grid;
      gap: 18px;
    }
    .roulette-card {
      background: linear-gradient(180deg, rgba(17,24,39,0.98), rgba(11,18,32,0.98));
      border: 1px solid rgba(212,175,55,0.2);
      border-radius: 28px;
      padding: 24px;
      box-shadow: 0 20px 60px rgba(0,0,0,0.3), inset 0 1px 0 rgba(255,255,255,0.04);
    }
    .roulette-wrap {
      position: relative;
      overflow: hidden;
      height: 240px;
      border-radius: 22px;
      border: 1px solid var(--line);
      background: linear-gradient(180deg, rgba(255,255,255,0.03), rgba(255,255,255,0.01));
    }
    .pointer-line {
      position: absolute;
      left: 0;
      right: 0;
      top: 50%;
      transform: translateY(-50%);
      height: 72px;
      border-top: 2px solid rgba(212,175,55,0.85);
      border-bottom: 2px solid rgba(212,175,55,0.85);
      background: linear-gradient(90deg, transparent, rgba(212,175,55,0.08), transparent);
      z-index: 2;
      pointer-events: none;
    }
    .pointer-badge {
      position: absolute;
      right: 16px;
      top: 50%;
      transform: translateY(-50%);
      z-index: 3;
      background: linear-gradient(135deg, var(--gold), var(--gold-2));
      color: #291b00;
      font-weight: 900;
      font-size: 12px;
      padding: 8px 12px;
      border-radius: 999px;
      box-shadow: 0 6px 20px rgba(0,0,0,0.25);
    }
    .ticker {
      position: absolute;
      left: 0;
      right: 0;
      top: 0;
      will-change: transform;
      z-index: 1;
    }
    .ticker-item {
      height: 72px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: clamp(24px, 3vw, 34px);
      font-weight: 900;
      letter-spacing: 0.03em;
      border-bottom: 1px solid rgba(255,255,255,0.04);
      color: #e8ecff;
      text-shadow: 0 4px 14px rgba(0,0,0,0.35);
    }
    .ticker-item:nth-child(odd) { background: rgba(255,255,255,0.02); }
    .subline {
      margin-top: 12px;
      color: var(--muted);
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      font-size: 14px;
    }
    .pill {
      display: inline-block;
      border-radius: 999px;
      padding: 8px 12px;
      background: rgba(255,255,255,0.06);
      border: 1px solid var(--line);
      color: var(--text);
      font-size: 13px;
    }
    .result-card {
      display: grid;
      gap: 16px;
      grid-template-columns: 1.1fr .9fr;
    }
    .winner {
      padding: 20px;
      border-radius: 24px;
      background: linear-gradient(180deg, rgba(212,175,55,0.12), rgba(212,175,55,0.05));
      border: 1px solid rgba(212,175,55,0.25);
    }
    .winner .kicker {
      color: var(--gold-2);
      font-size: 13px;
      font-weight: 800;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      margin-bottom: 8px;
    }
    .winner .pref {
      font-size: 40px;
      font-weight: 900;
      margin-bottom: 8px;
    }
    .winner .course {
      font-size: 26px;
      font-weight: 800;
      line-height: 1.3;
      margin-bottom: 12px;
    }
    .meta {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin-bottom: 14px;
    }
    .meta .pill.brand { border-color: rgba(96,165,250,0.4); }
    .meta .pill.score { border-color: rgba(34,197,94,0.4); }
    .meta .pill.dist { border-color: rgba(248,113,113,0.35); }
    .links {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      margin-top: 14px;
    }
    .linkbtn {
      text-decoration: none;
      color: var(--text);
      padding: 11px 14px;
      border-radius: 14px;
      background: rgba(255,255,255,0.08);
      border: 1px solid var(--line);
      font-weight: 700;
    }
    .linkbtn.primary {
      background: linear-gradient(135deg, #1f6feb, #60a5fa);
      border: none;
    }
    .candidate-list {
      padding: 16px;
      border-radius: 24px;
      background: rgba(255,255,255,0.03);
      border: 1px solid var(--line);
      max-height: 420px;
      overflow: auto;
    }
    .candidate-item {
      padding: 12px 0;
      border-bottom: 1px solid rgba(255,255,255,0.06);
    }
    .candidate-item:last-child { border-bottom: none; }
    .candidate-top {
      display: flex;
      justify-content: space-between;
      gap: 12px;
      align-items: start;
      margin-bottom: 6px;
    }
    .candidate-name {
      font-weight: 800;
      line-height: 1.35;
    }
    .candidate-sub {
      color: var(--muted);
      font-size: 13px;
    }
    .empty {
      padding: 20px;
      border-radius: 18px;
      background: rgba(248,113,113,0.1);
      border: 1px solid rgba(248,113,113,0.25);
      color: #fecaca;
    }
    @media (max-width: 980px) {
      .grid, .result-card { grid-template-columns: 1fr; }
      .wrap { padding: 14px; }
      .roulette-card { padding: 16px; }
      .roulette-wrap { height: 216px; }
      .ticker-item { font-size: 26px; }
    }
  </style>
</head>

  <div class="wrap">

    <div class="grid">

            <option value="autumn">秋</option>
            <option value="winter">冬</option>

        </div>

        <div class="section">
          <label class="title" for="areaSelect">Area</label>

        </div>

        <div class="section">

        <div class="actions">
          <button class="btn btn-primary" id="spinBtn">ルーレット開始</button>
          <button class="btn btn-secondary" id="rerollBtn">同じ県で再抽選</button>
        </div>
      </div>

      <div class="stage">
        <div class="roulette-card">
          <h2 style="margin-top:0;">都道府県ルーレット</h2>
          <div class="roulette-wrap">
            <div class="pointer-line"></div>
            <div class="pointer-badge">ここで決定</div>
            <div class="ticker" id="ticker"></div>
          </div>
          <div class="subline">
            <span class="pill" id="seasonLabel">季節: -</span>
            <span class="pill" id="areaLabel">エリア: 全国</span>
            <span class="pill" id="statusLabel">待機中</span>
          </div>
        </div>

        <div class="result-card">
          <div class="winner" id="winnerBox">
            <div class="kicker">Result</div>
            <div class="pref">-</div>
            <div class="course">まだ結果がありません</div>
            <div class="meta" id="winnerMeta"></div>
            <div id="winnerText" class="candidate-sub">ルーレットを回してください。</div>
            <div class="links" id="winnerLinks"></div>
          </div>

          <div class="candidate-list">
            <h3 style="margin-top:0;">候補一覧</h3>
            <div id="candidateList"></div>
          </div>
        </div>
      </div>
    </div>
  </div>

  '長崎県': { cool: 2, warm: 8, snow: 0, closure: 0, scenic: 7 },
  '熊本県': { cool: 3, warm: 7, snow: 0, closure: 0, scenic: 8 },
  '大分県': { cool: 3, warm: 7, snow: 0, closure: 0, scenic: 8 },
  '宮崎県': { cool: 2, warm: 10, snow: 0, closure: 0, scenic: 8 },
  '鹿児島県': { cool: 2, warm: 10, snow: 0, closure: 0, scenic: 8 },
  '沖縄県': { cool: 4, warm: 10, snow: 0, closure: 0, scenic: 7 }
};

const BRAND_URLS = {
  'GRAND PGM': 'https://www.pacificgolf.co.jp/grand/',
  'PGM': 'https://www.pacificgolf.co.jp/course/',
  'アコーディア': 'https://www.accordiagolf.com/',
  'その他': 'https://search.gora.golf.rakuten.co.jp/'
};

const prefectureNameMap = {
  '北海道': '北海道',
  '青森県':'青森','岩手県':'岩手','宮城県':'宮城','秋田県':'秋田','山形県':'山形','福島県':'福島',
  '茨城県':'茨城','栃木県':'栃木','群馬県':'群馬','埼玉県':'埼玉','千葉県':'千葉','東京都':'東京','神奈川県':'神奈川',
  '新潟県':'新潟','富山県':'富山','石川県':'石川','福井県':'福井','山梨県':'山梨','長野県':'長野','岐阜県':'岐阜','静岡県':'静岡','愛知県':'愛知',
  '三重県':'三重','滋賀県':'滋賀','京都府':'京都','大阪府':'大阪','兵庫県':'兵庫','奈良県':'奈良','和歌山県':'和歌山',
  '鳥取県':'鳥取','島根県':'島根','岡山県':'岡山','広島県':'広島','山口県':'山口',
  '徳島県':'徳島','香川県':'香川','愛媛県':'愛媛','高知県':'高知',
  '福岡県':'福岡','佐賀県':'佐賀','長崎県':'長崎','熊本県':'熊本','大分県':'大分','宮崎県':'宮崎','鹿児島県':'鹿児島','沖縄県':'沖縄'
};

function seedRand(str) {
  let h = 2166136261;
  for (let i = 0; i < str.length; i++) {
    h ^= str.charCodeAt(i);
    h += (h << 1) + (h << 4) + (h << 7) + (h << 8) + (h << 24);
  }
  return () => {
    h += 0x6D2B79F5;
    let t = Math.imul(h ^ (h >>> 15), 1 | h);
    t ^= t + Math.imul(t ^ (t >>> 7), 61 | t);
    return ((t ^ (t >>> 14)) >>> 0) / 4294967296;
  };
}

const premiumNames = {
  'GRAND PGM': ['御殿場東名ゴルフクラブ','美浦ゴルフ倶楽部','桂ゴルフ倶楽部','PGM石岡ゴルフクラブ','ザ・ゴルフクラブ竜ヶ崎','グランド札幌カントリークラブ'],
  'PGM': ['岡部チサンカントリークラブ','総丘カントリー倶楽部','武蔵ゴルフクラブ','千代田カントリークラブ','花の杜ゴルフクラブ','阿見ゴルフクラブ'],
  'アコーディア': ['東千葉カントリークラブ','さいたま梨花カントリークラブ','東京相武カントリークラブ','西東京ゴルフ倶楽部','四街道ゴルフ倶楽部','三木セブンハンドレッド倶楽部'],
  'その他': ['ロイヤルゴルフクラブ','フォレストカントリークラブ','レイクサイドゴルフ倶楽部','高原ゴルフクラブ','リバーサイドカントリークラブ','ヒルズゴルフ倶楽部','パークカントリークラブ','グリーンバレーゴルフクラブ']
};

function createCourses() {
  const courses = [];
  PREFS.forEach(pref => {
    const traits = PREF_TRAITS[pref];
    BRANDS.forEach(brand => {
      const count = brand === 'その他' ? 8 : brand === 'アコーディア' ? 4 : brand === 'PGM' ? 4 : 2;
      const names = premiumNames[brand];
      const rng = seedRand(pref + brand);
      for (let i = 0; i < count; i++) {
        const baseName = names[i % names.length];
        const aliasPref = prefectureNameMap[pref];
        const courseName = brand === 'その他'
          ? `${aliasPref} ${baseName}`
          : `${aliasPref} ${baseName}`;
        const flags = {
          solo: rng() > 0.35,
          stay: rng() > 0.7,
          cart: true,
          onsen: rng() > 0.68,
          ic: rng() > 0.28,
        };
        const baseDistance = Math.round(12 + rng() * 58);
        const regionBonus = REGION_BY_PREF[pref] === '北海道・東北' || REGION_BY_PREF[pref] === '中部' ? 4 : 0;
        const rating = Math.min(4.8, Math.max(3.8, 3.85 + rng() * 0.75 + (brand === 'GRAND PGM' ? 0.18 : brand === 'PGM' ? 0.08 : 0) + regionBonus * 0.005));
        courses.push({
          id: `${pref}-${brand}-${i}`,
          prefecture: pref,
          capital: PREF_CAPITALS[pref],
          brand,
          name: courseName,
          rating: Number(rating.toFixed(1)),
          distanceKm: baseDistance,
          conditions: [
            flags.solo ? '1人予約可' : null,
            flags.stay ? '宿泊あり' : null,
            flags.cart ? 'カートあり' : null,
            flags.onsen ? '温泉近く' : null,
            flags.ic ? '高速IC近い' : null,
          ].filter(Boolean),
          officialUrl: BRAND_URLS[brand],
        });
      }
    });
  });
  return courses;
}

const COURSES = createCourses();

const ticker = document.getElementById('ticker');
const brandChips = document.getElementById('brandChips');
const conditionChips = document.getElementById('conditionChips');
const seasonSelect = document.getElementById('seasonSelect');
const areaSelect = document.getElementById('areaSelect');
const spinBtn = document.getElementById('spinBtn');
const rerollBtn = document.getElementById('rerollBtn');
const seasonLabel = document.getElementById('seasonLabel');
const areaLabel = document.getElementById('areaLabel');
const statusLabel = document.getElementById('statusLabel');
const winnerBox = document.getElementById('winnerBox');
const winnerMeta = document.getElementById('winnerMeta');
const winnerText = document.getElementById('winnerText');
const winnerLinks = document.getElementById('winnerLinks');
const candidateList = document.getElementById('candidateList');

let activeBrands = new Set(BRANDS);
let activeConditions = new Set();
let currentPref = null;
let spinRunning = false;
let tickerItems = [];
let currentTranslate = 0;
const ITEM_H = 72;
const CONTAINER_H = 240;

function buildChips(target, values, activeSet) {
  target.innerHTML = '';
  values.forEach(v => {
    const label = document.createElement('label');
    label.className = 'chip active';
    label.innerHTML = `<input type="checkbox" checked><span>${v}</span>`;
    label.addEventListener('click', (e) => {
      e.preventDefault();
      if (activeSet.has(v)) activeSet.delete(v); else activeSet.add(v);
      if (target === brandChips && activeSet.size === 0) activeSet.add(v);
      renderChipStates();
      if (currentPref) renderForPref(currentPref, false);
    });
    target.appendChild(label);
  });
}

function renderChipStates() {
  [...brandChips.children].forEach((el, i) => el.classList.toggle('active', activeBrands.has(BRANDS[i])));
  [...conditionChips.children].forEach((el, i) => el.classList.toggle('active', activeConditions.has(CONDITIONS[i])));
}

function getSeason() {
  const val = seasonSelect.value;
  if (val !== 'auto') return val;
  const m = new Date().getMonth() + 1;
  if ([3,4,5].includes(m)) return 'spring';
  if ([6,7,8].includes(m)) return 'summer';
  if ([9,10,11].includes(m)) return 'autumn';
  return 'winter';
}

function seasonName(key) {
  return ({spring:'春',summer:'夏',autumn:'秋',winter:'冬'})[key] || '-';
}

function scoreComfort(course, season) {
  const t = PREF_TRAITS[course.prefecture];
  let score = 72 + (course.brand === 'GRAND PGM' ? 8 : course.brand === 'PGM' ? 4 : course.brand === 'アコーディア' ? 2 : 0);
  score += Math.max(0, (course.rating - 3.8) * 10);
  if (course.conditions.includes('カートあり')) score += 2;
  if (course.conditions.includes('高速IC近い')) score += 2;
  if (course.conditions.includes('宿泊あり')) score += 1;
  if (season === 'summer') {
    score += t.cool * 1.8 - t.warm * 0.2 - t.snow * 0.1 + t.scenic * 0.4;
  } else if (season === 'winter') {
    score += t.warm * 1.9 - t.snow * 2.3 - t.closure * 1.8 + t.scenic * 0.2;
  } else if (season === 'spring') {
    score += t.scenic * 0.7 + t.warm * 0.3 - t.snow * 0.2;
  } else if (season === 'autumn') {
    score += t.scenic * 0.8 + t.cool * 0.4 - t.snow * 0.2;
  }
  return Math.max(48, Math.min(99, Math.round(score)));
}

function filteredPrefs() {
  return AREAS[areaSelect.value] || PREFS;
}

function getEligibleCourses(pref) {
  const season = getSeason();
  return COURSES
    .filter(c => c.prefecture === pref)
    .filter(c => activeBrands.has(c.brand))
    .filter(c => [...activeConditions].every(cond => c.conditions.includes(cond)))
    .map(c => ({ ...c, comfort: scoreComfort(c, season) }))
    .sort((a, b) => b.comfort - a.comfort || a.distanceKm - b.distanceKm || b.rating - a.rating);
}

function makeTickerList(prefList, winnerPref) {
  const safe = prefList.length ? prefList : PREFS;
  const repeated = [];
  for (let k = 0; k < 6; k++) repeated.push(...safe);
  const before = repeated.slice();
  before.push(winnerPref);
  const after = safe.slice(0, 8);
  return [...before, ...after];
}

function renderTicker(items) {
  ticker.innerHTML = '';
  items.forEach(name => {
    const div = document.createElement('div');
    div.className = 'ticker-item';
    div.textContent = name;
    ticker.appendChild(div);
  });
}

function pickWinnerPref() {
  const prefs = filteredPrefs();
  return prefs[Math.floor(Math.random() * prefs.length)];
}

function animateToPref(winnerPref) {
  return new Promise(resolve => {
    const prefs = filteredPrefs();
    tickerItems = makeTickerList(prefs, winnerPref);
    renderTicker(tickerItems);

    const winnerIndex = tickerItems.lastIndexOf(winnerPref);
    const targetY = (CONTAINER_H / 2) - (ITEM_H / 2) - (winnerIndex * ITEM_H);
    const startY = 0;
    const duration = 3600;
    const start = performance.now();

    function easeOutCubic(t) { return 1 - Math.pow(1 - t, 3); }

    function step(now) {
      const p = Math.min(1, (now - start) / duration);
      currentTranslate = startY + (targetY - startY) * easeOutCubic(p);
      ticker.style.transform = `translateY(${currentTranslate}px)`;
      const centerIndex = Math.round(((CONTAINER_H / 2) - (ITEM_H / 2) - currentTranslate) / ITEM_H);
      statusLabel.textContent = `回転中: ${tickerItems[Math.max(0, Math.min(tickerItems.length - 1, centerIndex))]}`;
      if (p < 1) {
        requestAnimationFrame(step);
      } else {
        ticker.style.transform = `translateY(${targetY}px)`;
        statusLabel.textContent = `決定: ${winnerPref}`;
        resolve();
      }
    }
    requestAnimationFrame(step);
  });
}

function linksForCourse(course) {
  const q = encodeURIComponent(course.name + ' ' + course.prefecture);
  return {
    booking: course.officialUrl,
    maps: `https://www.google.com/maps/search/?api=1&query=${q}`,
    search: `https://www.google.com/search?q=${q}`
  };
}

function renderCandidates(candidates, pickedId = null) {
  candidateList.innerHTML = '';
  if (!candidates.length) {
    candidateList.innerHTML = `<div class="empty">条件に合うゴルフ場が見つかりませんでした。ブランドか条件を少し緩めてください。</div>`;
    return;
  }
  candidates.forEach(c => {
    const row = document.createElement('div');
    row.className = 'candidate-item';
    row.innerHTML = `
      <div class="candidate-top">
        <div>
          <div class="candidate-name">${c.id === pickedId ? '★ ' : ''}${c.name}</div>
          <div class="candidate-sub">${c.brand} / ${c.prefecture} / ${c.capital}近辺</div>
        </div>
        <div class="pill">快適度 ${c.comfort}</div>
      </div>
      <div class="candidate-sub">評価 ${c.rating.toFixed(1)} ・ 県庁所在地から約${c.distanceKm}km ・ ${c.conditions.join(' / ') || '条件情報なし'}</div>
    `;
    candidateList.appendChild(row);
  });
}

function renderWinner(pref, course, candidates) {
  const prefEl = winnerBox.querySelector('.pref');
  const courseEl = winnerBox.querySelector('.course');
  prefEl.textContent = pref || '-';
  if (!course) {
    courseEl.textContent = '条件に合う候補がありません';
    winnerMeta.innerHTML = '';
    winnerText.textContent = 'ブランドや条件を見直して、もう一度回してください。';
    winnerLinks.innerHTML = '';
    renderCandidates(candidates || []);
    return;
  }
  courseEl.textContent = course.name;
  winnerMeta.innerHTML = `
    <span class="pill brand">${course.brand}</span>
    <span class="pill score">快適度 ${course.comfort}</span>
    <span class="pill dist">${course.capital}から約${course.distanceKm}km</span>
    <span class="pill">評価 ${course.rating.toFixed(1)}</span>
    <span class="pill">${REGION_BY_PREF[pref]}</span>
  `;
  winnerText.textContent = `${seasonName(getSeason())}向き / ${course.conditions.join(' / ') || '条件情報なし'} / 県庁所在地は${course.capital}`;
  const links = linksForCourse(course);
  winnerLinks.innerHTML = `
    <a class="linkbtn primary" href="${links.booking}" target="_blank" rel="noopener noreferrer">予約サイトへ</a>
    <a class="linkbtn" href="${links.maps}" target="_blank" rel="noopener noreferrer">Google Maps</a>
    <a class="linkbtn" href="${links.search}" target="_blank" rel="noopener noreferrer">コース検索</a>
  `;
  renderCandidates(candidates, course.id);
}

function chooseCourseFromCandidates(candidates) {
  if (!candidates.length) return null;
  const pool = candidates.slice(0, Math.min(8, candidates.length));
  return pool[Math.floor(Math.random() * pool.length)];
}

function renderForPref(pref, keepWinner = true) {
  currentPref = pref;
  const candidates = getEligibleCourses(pref);
  let picked = null;
  if (keepWinner && candidates.length) picked = chooseCourseFromCandidates(candidates);
  renderWinner(pref, picked, candidates);
}

async function spinRoulette() {
  if (spinRunning) return;
  spinRunning = true;
  spinBtn.disabled = true;
  rerollBtn.disabled = true;
  seasonLabel.textContent = `季節: ${seasonName(getSeason())}`;
  areaLabel.textContent = `エリア: ${AREA_LABELS[areaSelect.value]}`;

  const winnerPref = pickWinnerPref();
  await animateToPref(winnerPref);
  currentPref = winnerPref;
  const candidates = getEligibleCourses(winnerPref);
  const picked = chooseCourseFromCandidates(candidates);
  renderWinner(winnerPref, picked, candidates);
  spinRunning = false;
  spinBtn.disabled = false;
  rerollBtn.disabled = false;
}

function rerollSamePref() {
  if (!currentPref) return;
  const candidates = getEligibleCourses(currentPref);
  const picked = chooseCourseFromCandidates(candidates);
  renderWinner(currentPref, picked, candidates);
  statusLabel.textContent = `同じ県で再抽選: ${currentPref}`;
}

buildChips(brandChips, BRANDS, activeBrands);
buildChips(conditionChips, CONDITIONS, activeConditions);
renderChipStates();
seasonLabel.textContent = `季節: ${seasonName(getSeason())}`;
areaLabel.textContent = `エリア: ${AREA_LABELS[areaSelect.value]}`;
statusLabel.textContent = '待機中';

tickerItems = makeTickerList(PREFS, '東京都');
renderTicker(tickerItems);
const initialIndex = tickerItems.lastIndexOf('東京都');
const initialY = (CONTAINER_H / 2) - (ITEM_H / 2) - (initialIndex * ITEM_H);
ticker.style.transform = `translateY(${initialY}px)`;
renderWinner('-', null, []);

spinBtn.addEventListener('click', spinRoulette);
rerollBtn.addEventListener('click', rerollSamePref);
seasonSelect.addEventListener('change', () => {
  seasonLabel.textContent = `季節: ${seasonName(getSeason())}`;
  if (currentPref) renderForPref(currentPref, false);
});
areaSelect.addEventListener('change', () => {
  areaLabel.textContent = `エリア: ${AREA_LABELS[areaSelect.value]}`;
  statusLabel.textContent = '待機中';
  currentPref = null;
  const prefs = filteredPrefs();
  tickerItems = makeTickerList(prefs, prefs[0]);
  renderTicker(tickerItems);
  const idx = tickerItems.lastIndexOf(prefs[0]);
  const y = (CONTAINER_H / 2) - (ITEM_H / 2) - (idx * ITEM_H);
  ticker.style.transform = `translateY(${y}px)`;
  renderWinner('-', null, []);
});
</script>
